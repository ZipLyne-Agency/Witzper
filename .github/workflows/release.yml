name: release

# Every push to main ships a signed, notarized release, refreshes latest.json
# (read by the in-app Updater) and bumps the Homebrew cask. Version =
# "<VERSION file MAJOR.MINOR>.<commit count>" — deterministic, no bump
# commits, no manual tagging.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  ZIP_NAME: Witzper.zip

jobs:
  build-and-publish:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build_app.sh computes the git rev-count build number

      - name: Compute version
        id: version
        run: |
          # VERSION holds the MAJOR.MINOR base (a legacy full X.Y.Z is
          # tolerated — only the first two components are used).
          BASE="$(cut -d. -f1,2 <<< "$(tr -d '[:space:]' < VERSION)")"
          BUILD="$(git rev-list --count HEAD)"
          VERSION="${BASE}.${BUILD}"
          # build_app.sh reads the VERSION file — stamp the computed version
          # into the workspace copy (never committed).
          echo "${VERSION}" > VERSION
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security set-keychain-settings -lut 21600 build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security import certificate.p12 -k build.keychain-db -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain-db
          security list-keychains -d user -s build.keychain-db login.keychain-db
          rm certificate.p12

      - name: Install uv (Python runtime bundler)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build & sign Witzper.app
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/build_app.sh

      - name: Notarize & staple
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo "$ASC_API_KEY_P8" > asc_key.p8
          ditto -c -k --sequesterRsrc --keepParent build/Witzper.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --key asc_key.p8 --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple build/Witzper.app
          rm notarize.zip asc_key.p8

      - name: Package zip
        id: package
        run: |
          cd build
          # ditto preserves bundle metadata + symlinks, unlike `zip -r`.
          # Fixed asset name so releases/latest/download/Witzper.zip is a
          # permanent "always newest" link.
          ditto -c -k --sequesterRsrc --keepParent Witzper.app "../${ZIP_NAME}"
          cd ..
          SHA256="$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')"
          SIZE="$(stat -f%z "${ZIP_NAME}")"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Write latest.json manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # This manifest is what the in-app Updater fetches. Keep the key
          # names stable — Updater.swift hard-codes them.
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}",
            "sha256": "${{ steps.package.outputs.sha256 }}",
            "size": ${{ steps.package.outputs.size }},
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "notes_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          }
          EOF
          cat latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # re-runs of the same commit produce the same tag — replace cleanly
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "Witzper ${VERSION}" \
            --notes "Signed & notarized by Apple. In-app auto-update (signature-verified).

          **Install:** \`brew install ziplyne-agency/witzper/witzper\` — or download \`${ZIP_NAME}\`, unzip, drag **Witzper.app** to Applications.

          **Updating from 0.2.x?** The app's code signature changed from ad-hoc to Developer ID, so macOS treats it as new: re-grant **Microphone**, **Accessibility** and **Input Monitoring** in System Settings → Privacy & Security after the update." \
            --latest \
            "${ZIP_NAME}" \
            "latest.json"

      # ----------------------------------------------------------------------
      # Auto-update the Homebrew tap so `brew upgrade --cask witzper` picks
      # up the new version without a human editing the formula. Gracefully
      # skipped if HOMEBREW_TAP_TOKEN is not set.
      #
      # HOMEBREW_TAP_TOKEN requirements: a GitHub Personal Access Token with
      # `Contents: write` on ZipLyne-Agency/homebrew-witzper.
      # ----------------------------------------------------------------------
      - name: Update Homebrew Cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping cask update."
            exit 0
          fi
          echo "→ cloning homebrew-witzper tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ZipLyne-Agency/homebrew-witzper.git" tap
          cd tap

          echo "→ rewriting Casks/witzper.rb"
          python3 - <<'PY'
          import os, re, pathlib
          path = pathlib.Path("Casks/witzper.rb")
          text = path.read_text()
          version = os.environ["VERSION"]
          sha = os.environ["SHA256"]
          text = re.sub(r'version\s+"[^"]+"', f'version "{version}"', text, count=1)
          text = re.sub(r'sha256\s+"[0-9a-fA-F]+"', f'sha256 "{sha}"', text, count=1)
          # Asset name is fixed ("Witzper.zip") as of the push-to-main release
          # pipeline — rewrite the url template so old casks migrate atomically
          # with the version/sha bump.
          text = re.sub(
              r'url\s+"https://github\.com/[^"]+"',
              'url "https://github.com/ZipLyne-Agency/Witzper/releases/download/v#{version}/Witzper.zip"',
              text, count=1)
          path.write_text(text)
          print(path.read_text())
          PY

          echo "→ committing + pushing"
          git config user.name "witzper-release-bot"
          git config user.email "witzper-release-bot@users.noreply.github.com"
          git add Casks/witzper.rb
          if git diff --cached --quiet; then
            echo "no cask changes — skipping push"
            exit 0
          fi
          git commit -m "witzper: bump to v${VERSION}"
          git push origin HEAD:main
