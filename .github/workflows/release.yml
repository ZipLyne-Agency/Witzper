name: release

on:
  push:
    tags:
      - "v*.*.*"

# Token needs write access to Contents for gh release create / file upload.
permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so build_app.sh can compute the git rev-count build number

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::VERSION file ($VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install uv (Python runtime bundler)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build Witzper.app
        run: |
          ./scripts/build_app.sh

      - name: Package zip
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="Witzper-${VERSION}.zip"
          cd build
          # ditto preserves bundle metadata + symlinks, unlike `zip -r`.
          ditto -c -k --sequesterRsrc --keepParent Witzper.app "../${ZIP_NAME}"
          cd ..
          SHA256="$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')"
          SIZE="$(stat -f%z "${ZIP_NAME}")"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Package dmg
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="Witzper-${VERSION}.dmg"
          STAGING="build/dmg-staging"
          rm -rf "${STAGING}"
          mkdir -p "${STAGING}"
          # Drag-to-install layout: the .app next to an Applications symlink
          # so users can drop Witzper.app straight into /Applications from the
          # mounted disk image.
          cp -R build/Witzper.app "${STAGING}/"
          ln -s /Applications "${STAGING}/Applications"
          # UDZO = compressed read-only; matches what create-dmg emits.
          hdiutil create \
            -volname "Witzper" \
            -srcfolder "${STAGING}" \
            -ov \
            -format UDZO \
            "${DMG_NAME}"
          DMG_SHA256="$(shasum -a 256 "${DMG_NAME}" | awk '{print $1}')"
          DMG_SIZE="$(stat -f%z "${DMG_NAME}")"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_sha256=$DMG_SHA256" >> "$GITHUB_OUTPUT"
          echo "dmg_size=$DMG_SIZE" >> "$GITHUB_OUTPUT"

      - name: Write latest.json manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          SHA256="${{ steps.package.outputs.sha256 }}"
          SIZE="${{ steps.package.outputs.size }}"
          # This manifest is what the in-app Updater fetches. Keep the key
          # names stable — Updater.swift hard-codes them.
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${GITHUB_REF_NAME}",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ZIP_NAME}",
            "sha256": "${SHA256}",
            "size": ${SIZE},
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "notes_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          }
          EOF
          cat latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          DMG_NAME="${{ steps.dmg.outputs.dmg_name }}"
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest \
            "${ZIP_NAME}" \
            "${DMG_NAME}" \
            "latest.json"

      # ----------------------------------------------------------------------
      # Auto-update the Homebrew tap so `brew upgrade --cask witzper` picks
      # up the new version without a human editing the formula. Gracefully
      # skipped if HOMEBREW_TAP_TOKEN is not set — that way forks and first
      # deploys don't fail just because the tap secret is missing.
      #
      # HOMEBREW_TAP_TOKEN requirements: a GitHub Personal Access Token
      # (fine-grained or classic) with `Contents: write` on the tap repo
      # ZipLyne-Agency/homebrew-witzper. Stored under repo Settings →
      # Secrets and variables → Actions → New repository secret.
      # ----------------------------------------------------------------------
      - name: Update Homebrew Cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping cask update."
            echo "To enable: GitHub → Settings → Secrets and variables → Actions → add HOMEBREW_TAP_TOKEN."
            exit 0
          fi
          echo "→ cloning homebrew-witzper tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ZipLyne-Agency/homebrew-witzper.git" tap
          cd tap

          echo "→ rewriting Casks/witzper.rb"
          python3 - <<'PY'
          import os, re, pathlib
          path = pathlib.Path("Casks/witzper.rb")
          text = path.read_text()
          version = os.environ["VERSION"]
          sha = os.environ["SHA256"]
          text = re.sub(r'version\s+"[^"]+"', f'version "{version}"', text, count=1)
          text = re.sub(r'sha256\s+"[0-9a-fA-F]+"', f'sha256 "{sha}"', text, count=1)
          path.write_text(text)
          print(path.read_text())
          PY

          echo "→ committing + pushing"
          git config user.name "witzper-release-bot"
          git config user.email "witzper-release-bot@users.noreply.github.com"
          git add Casks/witzper.rb
          if git diff --cached --quiet; then
            echo "no cask changes — skipping push"
            exit 0
          fi
          git commit -m "witzper: bump to v${VERSION}"
          git push origin HEAD:main
