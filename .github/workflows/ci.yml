name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check flow/
      - name: Pytest
        run: pytest -q

  swift-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build helper
        run: |
          cd swift-helper
          swift build -c release
