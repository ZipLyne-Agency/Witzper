# Witzper default configuration
# Override by copying to ~/.config/Witzper/config.toml

[hotkey]
# Legacy single-key config — superseded by [hotkeys.*] below.
# Kept so old user configs keep parsing. New code reads [hotkeys.*].
key = "fn"
toggle_mode = false

# Per-action shortcut bindings. Each action gets its own key.
# `key` accepts a single key ("fn", "right_option", "right_cmd",
# "right_shift", "caps_lock") or a chord like "right_cmd+right_option".
# `mode` is "hold" (push-to-talk) or "tap" (single-press toggle).
# Set key = "" to disable an action.
[hotkeys.dictate]
key = "fn"
mode = "hold"

[hotkeys.command]
key = "right_cmd+right_option"
mode = "hold"

[audio]
sample_rate = 16000
channels = 1
device = "default"
# Max utterance length in seconds (safety cap)
max_seconds = 120

[vad]
# "silero" (default — ungated, fast) or "pyannote" (requires HF auth + license accept)
backend = "silero"
model = "pyannote/segmentation-3.1"
# End-of-speech silence threshold in ms
endpoint_silence_ms = 700

[asr]
# "accuracy" uses Qwen3-ASR with full context injection
# "speed" uses Parakeet v3 with no context
# "auto" picks per-app using rules in configs/app_rules.toml
mode = "auto"
# Streaming partials + pre-flight ASR. While you hold the hotkey, Witzper
# runs the speed ASR on the growing audio buffer every streaming_interval_ms
# and emits partial transcripts to the HUD. On key release, if the last
# partial covered ≥streaming_reuse_ratio of the final audio, the cleanup LLM
# runs immediately on that partial — cutting perceived latency roughly in half.
streaming = true
streaming_interval_ms = 350
streaming_min_audio_ms = 350
streaming_reuse_ratio = 0.95

[asr.speed]
model = "mlx-community/parakeet-tdt-0.6b-v3"
backend = "parakeet-mlx"

[asr.accuracy]
# Qwen3-ASR MLX port — set path after cloning locally
model = "mlx-community/Qwen3-ASR"
backend = "qwen3-asr-mlx"
context_prompt_max_tokens = 1024

[cleanup]
# Hot-path LLM cleanup
model = "mlx-community/Qwen3-30B-A3B-Instruct-2507-8bit"
max_tokens = 96
temperature = 0.0
# Number of few-shot examples retrieved dynamically from correction store
few_shot_n = 5
# Hallucination guardrail: fall back to raw transcript if ratio exceeds this
max_length_ratio = 1.8
max_edit_distance_ratio = 0.5

[command]
# Command-mode model. Only loads on demand via separate hotkey.
# Defaults to reusing the cleanup model so there's zero extra RAM cost.
enabled = true
model = "mlx-community/Qwen3-30B-A3B-Instruct-2507-8bit"
max_tokens = 2048
# Hotkey moved to [hotkeys.command]. Left blank for back-compat.
hotkey = ""

[insertion]
# "paste" = clipboard + ⌘V (fast, works everywhere except password fields)
# "type" = synthesize keystrokes (slow, works in terminals/password fields)
default_strategy = "paste"
restore_clipboard_after_ms = 200

[personalization]
# Auto-add corrected spellings to dictionary
auto_add_to_dictionary = true
# Edit-watch window after insertion
edit_watch_window_seconds = 10
# Nightly LoRA fine-tune of cleanup model
cleanup_lora_enabled = true
cleanup_lora_rank = 16
cleanup_lora_schedule_cron = "0 3 * * *"
# Biweekly LoRA fine-tune of ASR model on user audio+corrections
asr_lora_enabled = true
asr_lora_rank = 8
asr_lora_schedule_cron = "0 4 */14 * *"
# DSPy prompt optimization
dspy_enabled = true

[ui]
menu_bar_icon = true
floating_pill = true

[telemetry]
# Everything stays local. No telemetry, ever.
enabled = false

[styles]
# Single global style for all apps. Default: casual (caps + less punctuation).
# Other options remain available for power users via 'flow style <category> <name>'
# but the recommended setup is to leave everything on casual.
personal_messages = "casual"
work_messages = "casual"
email = "casual"
other = "casual"

[snippets]
# Match snippets case-insensitive whole-word against the cleaned transcript.
# When a transcript IS just the trigger phrase, strip trailing punctuation first.
case_insensitive = true
strip_trailing_punct_on_solo_trigger = true
